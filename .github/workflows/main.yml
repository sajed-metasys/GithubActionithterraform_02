name: Deploy Infrastructure

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # ── JOB 1: Terraform ──────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    outputs:
      vm_ip: ${{ steps.get_ip.outputs.vm_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      - name: Get VM IP
        if: github.ref == 'refs/heads/main'
        id: get_ip
        run: echo "vm_ip=$(terraform output -raw vm_public_ip)" >> $GITHUB_OUTPUT

  # ── JOB 2: Ansible ───────────────────────────────
  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Build inventory
        run: |
          echo "[data_vms]" > ansible/inventory/hosts.ini
          echo "${{ needs.terraform.outputs.vm_ip }} \
            ansible_user=ubuntu \
            ansible_ssh_private_key_file=/tmp/deploy_key" \
            >> ansible/inventory/hosts.ini

      - name: Wait for VM to boot
        run: sleep 30

      - name: Run Playbook
        run: |
          ansible-playbook \
            -i ansible/inventory/hosts.ini \
            ansible/playbook.yml \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
